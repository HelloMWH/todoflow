<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoFlow - 个人工作管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: {
              DEFAULT: 'hsl(var(--primary))',
              foreground: 'hsl(var(--primary-foreground))',
            },
            secondary: {
              DEFAULT: 'hsl(var(--secondary))',
              foreground: 'hsl(var(--secondary-foreground))',
            },
            destructive: {
              DEFAULT: 'hsl(var(--destructive))',
              foreground: 'hsl(var(--destructive-foreground))',
            },
            muted: {
              DEFAULT: 'hsl(var(--muted))',
              foreground: 'hsl(var(--muted-foreground))',
            },
            accent: {
              DEFAULT: 'hsl(var(--accent))',
              foreground: 'hsl(var(--accent-foreground))',
            },
            card: {
              DEFAULT: 'hsl(var(--card))',
              foreground: 'hsl(var(--card-foreground))',
            },
            success: {
              DEFAULT: 'hsl(var(--success))',
              foreground: 'hsl(var(--success-foreground))',
            },
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --background: 222.2 30% 10%;
      --foreground: 210 40% 96%;
      --card: 222.2 30% 12%;
      --card-foreground: 210 40% 96%;
      --popover: 222.2 30% 12%;
      --popover-foreground: 210 40% 96%;
      --primary: 217.2 85% 58%;
      --primary-foreground: 0 0% 100%;
      --secondary: 222.2 25% 18%;
      --secondary-foreground: 210 40% 96%;
      --muted: 222.2 25% 18%;
      --muted-foreground: 215 20% 60%;
      --accent: 222.2 25% 22%;
      --accent-foreground: 210 40% 96%;
      --destructive: 0 70% 50%;
      --destructive-foreground: 0 0% 100%;
      --success: 142.1 70% 50%;
      --success-foreground: 0 0% 100%;
      --border: 222.2 20% 22%;
      --input: 222.2 20% 22%;
      --ring: 217.2 85% 58%;
    }
    
    * { border-color: hsl(var(--border)); }
    body { 
      background: hsl(var(--background)); 
      color: hsl(var(--foreground)); 
      background-image: 
        radial-gradient(ellipse at 20% 0%, hsl(var(--primary) / 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, hsl(var(--primary) / 0.02) 0%, transparent 50%);
    }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: hsl(var(--muted-foreground) / 0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground) / 0.5); }
    
    .project-red { background: rgb(239 68 68 / 0.15); color: rgb(248 113 113); border: 1px solid rgb(239 68 68 / 0.3); }
    .project-orange { background: rgb(249 115 22 / 0.15); color: rgb(251 146 60); border: 1px solid rgb(249 115 22 / 0.3); }
    .project-yellow { background: rgb(234 179 8 / 0.15); color: rgb(250 204 21); border: 1px solid rgb(234 179 8 / 0.3); }
    .project-green { background: rgb(34 197 94 / 0.15); color: rgb(74 222 128); border: 1px solid rgb(34 197 94 / 0.3); }
    .project-teal { background: rgb(20 184 166 / 0.15); color: rgb(45 212 191); border: 1px solid rgb(20 184 166 / 0.3); }
    .project-blue { background: rgb(59 130 246 / 0.15); color: rgb(96 165 250); border: 1px solid rgb(59 130 246 / 0.3); }
    .project-purple { background: rgb(168 85 247 / 0.15); color: rgb(192 132 252); border: 1px solid rgb(168 85 247 / 0.3); }
    .project-pink { background: rgb(236 72 153 / 0.15); color: rgb(244 114 182); border: 1px solid rgb(236 72 153 / 0.3); }
    
    .icon-red { color: rgb(248 113 113); }
    .icon-orange { color: rgb(251 146 60); }
    .icon-yellow { color: rgb(250 204 21); }
    .icon-green { color: rgb(74 222 128); }
    .icon-teal { color: rgb(45 212 191); }
    .icon-blue { color: rgb(96 165 250); }
    .icon-purple { color: rgb(192 132 252); }
    .icon-pink { color: rgb(244 114 182); }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.25s ease-out; }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    
    .btn-primary {
      background: linear-gradient(135deg, hsl(var(--primary)), hsl(217.2 85% 50%));
      color: white;
      font-weight: 500;
      box-shadow: 0 2px 12px hsl(var(--primary) / 0.4);
      transition: all 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px hsl(var(--primary) / 0.5);
      filter: brightness(1.05);
    }
    
    .btn-secondary {
      background: hsl(var(--secondary));
      color: hsl(var(--foreground));
      border: 1px solid hsl(var(--border));
      transition: all 0.2s ease;
    }
    .btn-secondary:hover {
      background: hsl(var(--accent));
      border-color: hsl(var(--primary) / 0.4);
    }
    
    .todo-card {
      transition: all 0.2s ease;
      background: hsl(var(--card));
    }
    .todo-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      border-color: hsl(var(--primary) / 0.4);
    }
    
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
    }
    
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: linear-gradient(135deg, hsl(var(--primary)), hsl(217.2 85% 50%));
      color: white;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 4px 20px hsl(var(--primary) / 0.4);
      animation: slideUp 0.3s ease-out;
      z-index: 100;
    }
    
    /* 输入框优化 */
    input, select, textarea {
      background: hsl(var(--input));
      color: hsl(var(--foreground));
    }
    input::placeholder, textarea::placeholder {
      color: hsl(var(--muted-foreground));
    }
    
    /* 弹窗卡片 */
    .bg-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="app"></div>
  
  <script>
    // ========== 数据模型 ==========
    const STORAGE_KEYS = {
      TODOS: 'todoflow_todos',
      PROJECTS: 'todoflow_projects',
      SETTINGS: 'todoflow_settings',
    };

    const projectColors = ['blue', 'green', 'purple', 'orange', 'teal', 'pink', 'red', 'yellow'];
    
    // 默认周报周期模板
    const reportTemplates = [
      { id: 'lastWeek', name: '上周（周一到周日）' },
      { id: 'thisWeek', name: '本周（周一到今天）' },
      { id: 'lastThuToThisFri', name: '上周四到本周五' },
      { id: 'last7Days', name: '最近7天' },
      { id: 'last30Days', name: '最近30天' },
      { id: 'lastMonth', name: '上个月' },
    ];

    // ========== 工具函数 ==========
    function generateId(prefix = 'id') {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
    }

    function formatDate(date) {
      if (!date) return '';
      const d = new Date(date);
      return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    }

    function formatFullDate(date) {
      if (!date) return '';
      const d = new Date(date);
      return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function isOverdue(date) {
      if (!date) return false;
      const d = new Date(date);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return d < today;
    }

    // ========== 存储操作 ==========
    function loadTodos() {
      try {
        const data = localStorage.getItem(STORAGE_KEYS.TODOS);
        return data ? JSON.parse(data) : [];
      } catch { return []; }
    }

    function saveTodos(todos) {
      localStorage.setItem(STORAGE_KEYS.TODOS, JSON.stringify(todos));
    }

    function loadProjects() {
      try {
        const data = localStorage.getItem(STORAGE_KEYS.PROJECTS);
        const projects = data ? JSON.parse(data) : [];
        return ensureDefaultProject(projects);
      } catch { return ensureDefaultProject([]); }
    }

    function saveProjects(projects) {
      localStorage.setItem(STORAGE_KEYS.PROJECTS, JSON.stringify(projects));
    }

    // 确保默认项目存在并排序
    function ensureDefaultProject(projects) {
      const dailyExists = projects.some(p => p.id === 'daily');
      if (!dailyExists) {
        projects.unshift({
          id: 'daily',
          name: '日常',
          color: 'yellow',
          createdAt: new Date().toISOString(),
          order: 0,
          pinned: true,
        });
        saveProjects(projects);
      }
      // 按 pinned 和 order 排序
      return projects.sort((a, b) => {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return (a.order || 0) - (b.order || 0);
      });
    }

    function saveAiConfig(config) { localStorage.setItem('todoflow_ai_config', JSON.stringify(config)); }
    function loadAiConfig() {
      try {
        const data = localStorage.getItem('todoflow_ai_config');
        return data ? JSON.parse(data) : { enabled: false, provider: 'openai', apiKey: '', baseUrl: 'https://api.openai.com/v1', model: 'gpt-4o-mini' };
      } catch { return { enabled: false, provider: 'openai', apiKey: '', baseUrl: 'https://api.openai.com/v1', model: 'gpt-4o-mini' }; }
    }

    // 计算存储大小
    function getStorageSize() {
      const todos = localStorage.getItem(STORAGE_KEYS.TODOS) || '';
      const projects = localStorage.getItem(STORAGE_KEYS.PROJECTS) || '';
      const totalBytes = new Blob([todos + projects]).size;
      return {
        bytes: totalBytes,
        kb: (totalBytes / 1024).toFixed(1),
        mb: (totalBytes / 1024 / 1024).toFixed(2),
        todos: JSON.parse(todos || '[]').length,
        projects: JSON.parse(projects || '[]').length,
      };
    }

    // 清理旧数据（已完成超过30天的任务）
    function cleanupOldData() {
      const thirtyDaysAgo = new Date();
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      
      const todos = loadTodos();
      const cleanedTodos = todos.filter(t => {
        if (t.status === 'active') return true;
        const completedDate = t.completedAt ? new Date(t.completedAt) : new Date(t.updatedAt);
        return completedDate >= thirtyDaysAgo;
      });
      
      const removedCount = todos.length - cleanedTodos.length;
      saveTodos(cleanedTodos);
      return removedCount;
    }

    // 导出数据
    function exportData() {
      const data = {
        todos: loadTodos(),
        projects: loadProjects(),
        exportedAt: new Date().toISOString(),
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `todoflow_backup_${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 导入数据
    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.todos && data.projects) {
              if (confirm('导入将覆盖当前所有数据，是否继续？')) {
                saveTodos(data.todos);
                saveProjects(data.projects);
                state.todos = data.todos;
                state.projects = data.projects;
                state.selectedProjectId = 'all';
                render();
                showToast(`成功导入 ${data.todos.length} 个任务，${data.projects.length} 个项目`);
              }
            } else {
              showToast('文件格式不正确');
            }
          } catch (err) {
            showToast('文件解析失败');
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // ========== 周报生成 ==========
    function generateWeeklyReport(todos, projects, startDate, endDate) {
      const periodTodos = todos.filter(t => {
        const created = new Date(t.createdAt);
        const completed = t.completedAt ? new Date(t.completedAt) : null;
        created.setHours(0, 0, 0, 0);
        if (completed) completed.setHours(0, 0, 0, 0);
        return (created >= startDate && created <= endDate) ||
               (completed && completed >= startDate && completed <= endDate);
      });

      const completedTodos = periodTodos.filter(t => t.status === 'completed');
      const cancelledTodos = periodTodos.filter(t => t.status === 'cancelled');
      const activeTodos = periodTodos.filter(t => t.status === 'active');

      const getProjectName = (projectId) => {
        if (!projectId) return '收件箱';
        const project = projects.find(p => p.id === projectId);
        return project?.name || '未知项目';
      };

      const byProject = {};
      completedTodos.forEach(todo => {
        const projectName = getProjectName(todo.projectId);
        if (!byProject[projectName]) byProject[projectName] = [];
        byProject[projectName].push(todo);
      });

      let report = `# 周报：${formatFullDate(startDate)} - ${formatFullDate(endDate)}\n\n`;
      report += `## 📊 本周概览\n`;
      report += `- 新建任务：${periodTodos.length} 个\n`;
      report += `- 完成任务：${completedTodos.length} 个\n`;
      report += `- 取消任务：${cancelledTodos.length} 个\n`;
      if (periodTodos.length > 0) {
        report += `- 完成率：${Math.round((completedTodos.length / periodTodos.length) * 100)}%\n`;
      }
      report += `\n`;

      if (Object.keys(byProject).length > 0) {
        report += `## 📁 项目进展\n\n`;
        Object.entries(byProject).forEach(([projectName, todos]) => {
          report += `### ${projectName}\n`;
          todos.forEach(todo => {
            report += `- ✅ ${todo.title}\n`;
            if (todo.followUpTask) {
              report += `  - 📌 后续：${todo.followUpTask}\n`;
            }
          });
          report += `\n`;
        });
      }

      if (cancelledTodos.length > 0) {
        report += `## ❌ 已取消\n\n`;
        cancelledTodos.forEach(todo => {
          report += `- ${todo.title}\n`;
        });
        report += `\n`;
      }

      if (activeTodos.length > 0) {
        report += `## 🔄 进行中\n\n`;
        activeTodos.forEach(todo => {
          report += `- ${todo.title} (${getProjectName(todo.projectId)})\n`;
        });
      }

      return report;
    }

    // ========== AI 增强周报生成 ==========
    async function generateAIReport(todos, projects, startDate, endDate) {
      const aiConfig = state.aiConfig;
      if (!aiConfig.enabled || !aiConfig.apiKey) {
        showToast('请先在设置中配置 AI API');
        return null;
      }

      state.isGeneratingReport = true;
      render();

      try {
        // 准备数据
        const periodTodos = todos.filter(t => {
          const created = new Date(t.createdAt);
          const completed = t.completedAt ? new Date(t.completedAt) : null;
          created.setHours(0, 0, 0, 0);
          if (completed) completed.setHours(0, 0, 0, 0);
          return (created >= startDate && created <= endDate) ||
                 (completed && completed >= startDate && completed <= endDate);
        });

        const completedTodos = periodTodos.filter(t => t.status === 'completed');
        const cancelledTodos = periodTodos.filter(t => t.status === 'cancelled');
        const activeTodos = periodTodos.filter(t => t.status === 'active');

        const getProjectName = (projectId) => {
          if (!projectId) return '收件箱';
          const project = projects.find(p => p.id === projectId);
          return project?.name || '未知项目';
        };

        // 格式化任务列表
        const completedList = completedTodos.map(t => {
          let task = `- ${t.title} [${getProjectName(t.projectId)}]`;
          if (t.followUpTask) task += `\n  → 后续: ${t.followUpTask}`;
          return task;
        }).join('\n');

        const cancelledList = cancelledTodos.map(t => `- ${t.title} [${getProjectName(t.projectId)}]`).join('\n');
        const activeList = activeTodos.map(t => `- ${t.title} [${getProjectName(t.projectId)}]`).join('\n');

        const formatDate = (d) => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
        const startStr = formatDate(startDate);
        const endStr = formatDate(endDate);

        // 构建提示词
        const prompt = `你是资深产品经理，擅长撰写精炼、有洞察力的工作周报。

请基于以下任务数据，生成一份专业的周报：

## 时间范围
${startStr} 至 ${endStr}

## 本周完成任务 (${completedTodos.length}个)
${completedList || '无'}

## 已取消任务 (${cancelledTodos.length}个)
${cancelledList || '无'}

## 进行中任务 (${activeTodos.length}个)
${activeList || '无'}

## 项目分布
${(() => {
  const byProject = {};
  completedTodos.forEach(t => {
    const p = getProjectName(t.projectId);
    byProject[p] = (byProject[p] || 0) + 1;
  });
  return Object.entries(byProject).map(([k, v]) => `${k}: ${v}个`).join(', ') || '无';
})()}

请生成一份包含以下内容的周报（使用中文，语言简洁专业）：
1. **本周概览**：用一句话总结本周工作主题和亮点
2. **核心成果**：挑选2-3个最有价值的任务，详细说明做了什么、带来什么价值
3. **工作洞察**：分析本周工作模式，发现的问题或值得注意的事
4. **下周计划**：基于进行中的任务，列出下周重点推进事项
5. **风险与阻塞**：如果有，取消的任务或明显的问题

要求：
- 语言自然流畅，避免机械罗列
- 突出个人贡献和价值
- 适当使用 emoji 增强可读性
- 总字数控制在 300-500 字`;

        // 调用 AI API
        let response;
        let aiContent = '';

        if (aiConfig.provider === 'claude') {
          // Claude API
          response = await fetch(aiConfig.baseUrl + '/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': aiConfig.apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
              model: aiConfig.model,
              max_tokens: 2000,
              messages: [{ role: 'user', content: prompt }]
            })
          });
          const data = await response.json();
          aiContent = data.content?.[0]?.text || '';
        } else {
          // OpenAI 兼容 API (包括 Ollama)
          response = await fetch(aiConfig.baseUrl + '/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${aiConfig.apiKey}`
            },
            body: JSON.stringify({
              model: aiConfig.model,
              messages: [{ role: 'user', content: prompt }],
              temperature: 0.7,
              max_tokens: 2000
            })
          });
          const data = await response.json();
          aiContent = data.choices?.[0]?.message?.content || '';
        }

        if (!response.ok) {
          throw new Error(`API 错误: ${response.status}`);
        }

        // 组合最终报告
        const stats = `📊 **数据统计**
- 新建任务：${periodTodos.length} 个
- 完成任务：${completedTodos.length} 个  
- 取消任务：${cancelledTodos.length} 个
- 完成率：${periodTodos.length > 0 ? Math.round((completedTodos.length / periodTodos.length) * 100) : 0}%

---
`;
        return `# 周报：${startStr} - ${endStr}\n\n${stats}${aiContent}`;

      } catch (error) {
        console.error('AI Report Error:', error);
        showToast('AI 生成失败: ' + error.message);
        return null;
      } finally {
        state.isGeneratingReport = false;
        render();
      }
    }

    // ========== 应用状态 ==========
    let state = {
      todos: loadTodos(),
      projects: loadProjects(),
      selectedProjectId: 'all',
      activeTab: 'active', // active | completed | cancelled
      showTaskModal: false,
      editingTodo: null,
      showProjectModal: false,
      showReportModal: false,
      showSettingsModal: false,
      settingsTab: 'data',
      reportContent: '',
      reportStartDate: '',
      reportEndDate: '',
      selectedReportTemplate: 'lastThuToThisFri',
      // 表单
      taskTitle: '',
      taskProjectId: '',
      taskDueDate: '',
      taskUrl: '',
      taskFollowUp: '',
      projectName: '',
      projectColor: 'blue',
      // AI 配置
      aiConfig: loadAiConfig(),
      isGeneratingReport: false,
      // Toast
      toastMessage: '',
    };

    // 初始化周报日期
    function initReportDates() {
      const result = calculateDateRange('lastThuToThisFri');
      state.reportStartDate = result.start;
      state.reportEndDate = result.end;
    }
    initReportDates();

    // 计算日期范围
    function calculateDateRange(template) {
      const today = new Date();
      const dayOfWeek = today.getDay();
      
      switch (template) {
        case 'lastWeek': {
          const diff = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
          const lastMonday = new Date(today);
          lastMonday.setDate(today.getDate() - diff - 7);
          const lastSunday = new Date(lastMonday);
          lastSunday.setDate(lastMonday.getDate() + 6);
          return { start: lastMonday.toISOString().split('T')[0], end: lastSunday.toISOString().split('T')[0] };
        }
        case 'thisWeek': {
          const diff = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
          const thisMonday = new Date(today);
          thisMonday.setDate(today.getDate() - diff);
          return { start: thisMonday.toISOString().split('T')[0], end: today.toISOString().split('T')[0] };
        }
        case 'lastThuToThisFri': {
          // 上周四
          const thursday = 4;
          const diffToThursday = (dayOfWeek + 7 - thursday) % 7;
          const lastThursday = new Date(today);
          lastThursday.setDate(today.getDate() - diffToThursday - 7);
          // 本周五
          const friday = 5;
          const diffToFriday = (friday - dayOfWeek + 7) % 7;
          const thisFriday = new Date(today);
          if (diffToFriday === 0) {
            // 今天是周五
          } else {
            thisFriday.setDate(today.getDate() + diffToFriday);
          }
          return { start: lastThursday.toISOString().split('T')[0], end: thisFriday.toISOString().split('T')[0] };
        }
        case 'last7Days': {
          const start = new Date(today);
          start.setDate(today.getDate() - 6);
          return { start: start.toISOString().split('T')[0], end: today.toISOString().split('T')[0] };
        }
        case 'last30Days': {
          const start = new Date(today);
          start.setDate(today.getDate() - 29);
          return { start: start.toISOString().split('T')[0], end: today.toISOString().split('T')[0] };
        }
        case 'lastMonth': {
          const firstDayLastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
          const lastDayLastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
          return { start: firstDayLastMonth.toISOString().split('T')[0], end: lastDayLastMonth.toISOString().split('T')[0] };
        }
        default:
          return { start: state.reportStartDate, end: state.reportEndDate };
      }
    }

          d.setHours(0, 0, 0, 0);

    // ========== 事件处理 ==========
    function selectProject(projectId) {
      state.selectedProjectId = projectId;
      render();
    }

    function setActiveTab(tab) {
      state.activeTab = tab;
      render();
    }

    function togglePinProject(projectId) {
      const project = state.projects.find(p => p.id === projectId);
      if (project) {
        project.pinned = !project.pinned;
        state.projects = state.projects.sort((a, b) => {
          if (a.pinned && !b.pinned) return -1;
          if (!a.pinned && b.pinned) return 1;
          return (a.order || 0) - (b.order || 0);
        });
        saveProjects(state.projects);
        render();
      }
    }

    function moveProject(projectId, direction) {
      const idx = state.projects.findIndex(p => p.id === projectId);
      if (idx === -1) return;
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= state.projects.length) return;

      // 交换位置
      const temp = state.projects[idx].order;
      state.projects[idx].order = state.projects[newIdx].order;
      state.projects[newIdx].order = temp;
      
      state.projects = state.projects.sort((a, b) => {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return (a.order || 0) - (b.order || 0);
      });
      
      saveProjects(state.projects);
      render();
    }

    function openTaskModal() {
      state.showTaskModal = true;
      state.editingTodo = null;
      state.taskTitle = '';
      state.taskProjectId = '';
      state.taskDueDate = '';
      state.taskUrl = '';
      state.taskFollowUp = '';
      render();
      setTimeout(() => document.getElementById('taskTitleInput')?.focus(), 100);
    }

    function editTask(todoId) {
      const todo = state.todos.find(t => t.id === todoId);
      if (!todo) return;
      state.showTaskModal = true;
      state.editingTodo = todo;
      state.taskTitle = todo.title;
      state.taskProjectId = todo.projectId || '';
      state.taskDueDate = todo.dueDate || '';
      state.taskUrl = todo.url || '';
      state.taskFollowUp = todo.followUpTask || '';
      render();
    }

    function closeTaskModal() {
      state.showTaskModal = false;
      state.editingTodo = null;
      render();
    }

    function saveTask() {
      const title = document.getElementById('taskTitleInput')?.value?.trim();
      if (!title) {
        showToast('请输入任务标题');
        return;
      }

      const projectId = document.getElementById('taskProjectSelect')?.value || null;
      const dueDate = document.getElementById('taskDueDateInput')?.value || null;
      const url = document.getElementById('taskUrlInput')?.value?.trim() || null;
      const followUp = document.getElementById('taskFollowUpInput')?.value?.trim() || null;

      if (state.editingTodo) {
        state.todos = state.todos.map(t => 
          t.id === state.editingTodo.id 
            ? { ...t, title, projectId, dueDate, url, followUpTask: followUp, updatedAt: new Date().toISOString() }
            : t
        );
        showToast('任务已更新');
      } else {
        const newTodo = {
          id: generateId('todo'),
          title,
          projectId,
          status: 'active',
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          completedAt: null,
          dueDate,
          url,
          followUpTask: followUp,
          order: state.todos.filter(t => t.status === 'active').length,
        };
        state.todos.push(newTodo);
        showToast('任务已创建');
      }

      saveTodos(state.todos);
      closeTaskModal();
    }

    // 从编辑弹窗完成任务（可填写延续任务）
    function completeTaskFromModal() {
      if (!state.editingTodo) return;
      
      const title = document.getElementById('taskTitleInput')?.value?.trim();

        showToast('请输入任务标题');
        return;
      }

      const projectId = document.getElementById('taskProjectSelect')?.value || null;
      const dueDate = document.getElementById('taskDueDateInput')?.value || null;
      const url = document.getElementById('taskUrlInput')?.value?.trim() || null;
      const followUp = document.getElementById('taskFollowUpInput')?.value?.trim() || null;

      const now = new Date().toISOString();
      
      // 先更新并完成任务
      state.todos = state.todos.map(t => 
        t.id === state.editingTodo.id 
          ? { ...t, title, projectId, dueDate, url, followUpTask: followUp, status: 'completed', completedAt: now, updatedAt: now }
          : t
      );

      // 如果有延续任务，创建新任务
      if (followUp) {
        const newTodo = {
          id: generateId('todo'),
          title: followUp,
          projectId: projectId,
          status: 'active',
          createdAt: now,
          updatedAt: now,
          completedAt: null,
          dueDate: null,
          followUpTask: null,
          order: state.todos.filter(t => t.status === 'active').length,
        };
        state.todos.push(newTodo);
        showToast('已完成，已创建延续任务');
      } else {
        showToast('任务已完成');
      }

      saveTodos(state.todos);
      closeTaskModal();
    }

    function completeTask(todoId) {
      const todo = state.todos.find(t => t.id === todoId);
      if (!todo) return;

      const now = new Date().toISOString();
      state.todos = state.todos.map(t => 
        t.id === todoId ? { ...t, status: 'completed', completedAt: now, updatedAt: now } : t
      );

      if (todo.followUpTask) {
        const newTodo = {
          id: generateId('todo'),
          title: todo.followUpTask,
          projectId: todo.projectId,
          status: 'active',
          createdAt: now,
          updatedAt: now,
          completedAt: null,
          dueDate: null,
          followUpTask: null,
          order: state.todos.filter(t => t.status === 'active').length,
        };
        state.todos.push(newTodo);
        showToast('已完成，已创建延续任务');
      } else {
        showToast('任务已完成');
      }

      saveTodos(state.todos);
      render();
    }

    function cancelTask(todoId) {
      const now = new Date().toISOString();
      state.todos = state.todos.map(t => 
        t.id === todoId ? { ...t, status: 'cancelled', updatedAt: now } : t
      );
      saveTodos(state.todos);
      showToast('任务已取消');
      render();
    }

    function deleteTask(todoId) {
      state.todos = state.todos.filter(t => t.id !== todoId);
      saveTodos(state.todos);
      showToast('任务已删除');
      render();
    }

    function openProjectModal() {
      state.showProjectModal = true;
      state.projectName = '';
      state.projectColor = 'blue';
      render();
      setTimeout(() => document.getElementById('projectNameInput')?.focus(), 100);
    }

    function closeProjectModal() {
      state.showProjectModal = false;
      render();
    }

    function selectProjectColor(color) {
      state.projectColor = color;
      render();
    }

    function createProject() {
      const name = document.getElementById('projectNameInput')?.value?.trim();
      if (!name) {
        showToast('请输入项目名称');
        return;
      }

      const newProject = {
        id: generateId('proj'),
        name,
        color: state.projectColor,
        createdAt: new Date().toISOString(),
        order: state.projects.length,
      };
      state.projects.push(newProject);
      saveProjects(state.projects);
      showToast('项目已创建');
      closeProjectModal();
    }

    function deleteProject(projectId) {
      if (projectId === 'daily') {
        showToast('日常项目不能删除');
        return;
      }
      state.projects = state.projects.filter(p => p.id !== projectId);
      state.todos = state.todos.map(t => 
        t.projectId === projectId ? { ...t, projectId: null } : t
      );
      if (state.selectedProjectId === projectId) {
        state.selectedProjectId = 'all';
      }
      saveProjects(state.projects);
      saveTodos(state.todos);
      showToast('项目已删除');
      render();
    }

    function openReportModal() {
      state.showReportModal = true;
      generateReportFromInputs();
      render();
    }

    function closeReportModal() {
      state.showReportModal = false;
      render();
    }

    function selectReportTemplate(templateId) {
      state.selectedReportTemplate = templateId;
      const result = calculateDateRange(templateId);
      state.reportStartDate = result.start;
      state.reportEndDate = result.end;
      generateReportFromInputs();
      render();
    }

    function clearReportTemplate() {
      state.selectedReportTemplate = '';
    }

    function generateReportFromInputs() {
      const startStr = document.getElementById('reportStartDateInput')?.value || state.reportStartDate;
      const endStr = document.getElementById('reportEndDateInput')?.value || state.reportEndDate;

      state.reportStartDate = startStr;
      state.reportEndDate = endStr;

      const start = new Date(startStr);
      const end = new Date(endStr);
      end.setHours(23, 59, 59, 999);

      state.reportContent = generateWeeklyReport(state.todos, state.projects, start, end);
      render();
    }

    async function generateAIReportFromInputs() {
      const startStr = document.getElementById('reportStartDateInput')?.value || state.reportStartDate;
      const endStr = document.getElementById('reportEndDateInput')?.value || state.reportEndDate;

      state.reportStartDate = startStr;
      state.reportEndDate = endStr;

      const start = new Date(startStr);
      const end = new Date(endStr);
      end.setHours(23, 59, 59, 999);

      const aiReport = await generateAIReport(state.todos, state.projects, start, end);
      if (aiReport) {
        state.reportContent = aiReport;
        render();
      }
    }

    function copyReport() {
      if (!state.reportContent) {
        showToast('请先生成周报');
        return;
      }
      navigator.clipboard.writeText(state.reportContent).then(() => {
        showToast('周报已复制到剪贴板');
      });
    }

    function openSettingsModal() {
      state.showSettingsModal = true;
      render();
    }

    function closeSettingsModal() {
      state.showSettingsModal = false;
      render();
    }

    function setSettingsTab(tab) {
      state.settingsTab = tab;
      render();
    }

    function toggleAiEnabled() {
      state.aiConfig.enabled = !state.aiConfig.enabled;
      saveAiConfig(state.aiConfig);
      render();
    }

    function updateAiConfig(key, value) {
      // 如果切换到 ollama，设置默认值
      if (key === 'provider') {
        if (value === 'ollama') {
          state.aiConfig.baseUrl = 'http://localhost:11434/v1';
          state.aiConfig.model = 'llama3';
        } else if (value === 'claude') {
          state.aiConfig.baseUrl = 'https://api.anthropic.com/v1';
          state.aiConfig.model = 'claude-3-haiku-20240307';
        } else if (value === 'openai') {
          state.aiConfig.baseUrl = 'https://api.openai.com/v1';
          state.aiConfig.model = 'gpt-4o-mini';
        }
      }
      state.aiConfig[key] = value;
      saveAiConfig(state.aiConfig);
      render();
    }

    function handleExportData() {
      exportData();
      showToast('数据已导出');
    }

    function handleImportData() {
      importData();
    }

    function handleCleanupData() {
      const removed = cleanupOldData();
      state.todos = loadTodos();
      render();
      showToast(`已清理 ${removed} 条旧任务`);
    }

    // 初始化渲染
    render();
  </script>
</body>
</html>
